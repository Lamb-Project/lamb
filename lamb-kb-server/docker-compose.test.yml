services:
  qdrant-test:
    image: qdrant/qdrant:v1.11.0
    container_name: kbs-test-qdrant
    ports:
      - "${QDRANT_TEST_PORT:-6333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /qdrant/storage

  ollama-test:
    image: ollama/ollama:latest
    container_name: kbs-test-ollama
    ports:
      - "${OLLAMA_TEST_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 60
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 3
        ollama pull nomic-embed-text || true
        wait

volumes:
  ollama-models:
